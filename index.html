function mkPost(tpl='progetti') {

    id: Date.now()+Math.random().toString(36).slice(2,8),

  };
}

const loadP = () => { try { return JSON.parse(localStorage.getItem('op_social')||'[]'); } catch { return []; } };
const saveP = p => { try { localStorage.setItem('op_social', JSON.stringify(p)); } catch {} };

/* ─────────────────── DRAGGABLE CANVAS ELEMENT ─────────── */
function CE({ dragKey, off, onDrag, hov, setHov, style={}, children }) {
  const o = off[dragKey] || {x:0,y:0};
  return (
    <div
      onMouseDown={e => onDrag(dragKey, e)}
      onMouseEnter={() => setHov(dragKey)}
      onMouseLeave={() => setHov(null)}
      style={{
        position:'absolute', cursor:'grab', userSelect:'none',
        outline: hov===dragKey ? '1.5px dashed rgba(201,48,45,.5)' : 'none',
        outlineOffset:'5px',
        left: (style.left||0) + o.x + 'px',
        top:  (style.top||0)  + o.y + 'px',
        ...style, left: undefined, top: undefined,
        // recalc after offset extraction
      }}
      style={{
        position:'absolute', cursor:'grab', userSelect:'none',
        outline: hov===dragKey ? '1.5px dashed rgba(201,48,45,.5)' : 'none',
        outlineOffset:'5px',
        left: ((typeof style.left==='number'?style.left:0) + o.x) + 'px',
        top:  ((typeof style.top ==='number'?style.top :0) + o.y) + 'px',
        ...Object.fromEntries(Object.entries(style).filter(([k])=>k!=='left'&&k!=='top')),
      }}
    >{children}</div>
  );
}

/* ─────────────────── CANVAS TEMPLATES ─────────────────── */
function ProgettiCanvas({ p, off, onDrag, hov, setHov }) {
  const tc = p.fields.colorMode==='brown' ? BR : RD;
  const iF = p.fields.colorMode==='brown' ? 'sepia(1) saturate(1.8) hue-rotate(345deg) brightness(.52)' : 'brightness(0) saturate(100%) invert(24%) sepia(97%) saturate(700%) hue-rotate(333deg) brightness(105%)';

  return (<>
    <CE dragKey="header" {...drag} style={{left:64,top:68,display:'flex',alignItems:'center',gap:'12px'}}>
      <img src={window.__resources?.iconProgetti||'uploads/OP - progetti.png'} style={{height:'22px',filter:iF}} alt=""/>
      <span style={{fontSize:'18px',fontWeight:800,color:tc,letterSpacing:'0.02em'}}>{p.fields.category}</span>
      <span style={{fontSize:'18px',fontWeight:400,color:tc,letterSpacing:'0.02em'}}>{p.fields.subcategory}</span>

/* ─────────────────── CALENDAR ─────────────────────────── */
function Calendar({ posts, onEdit }) {
  const today = new Date();
  const [m, setM] = useState(today.getMonth());
  const [y, setY] = useState(today.getFullYear());
  const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const DAYS   = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const first  = new Date(y,m,1).getDay(); // 0=sun
  const offset = first===0?6:first-1;
  const total  = new Date(y,m+1,0).getDate();
  const cells  = Array.from({length:offset+total},(_,i)=>i<offset?null:i-offset+1);
  const byDay  = {};
  posts.forEach(p=>{ if(p.scheduledDate){ const d=new Date(p.scheduledDate+'T00:00:00'); if(d.getMonth()===m&&d.getFullYear()===y){ const k=d.getDate(); byDay[k]=(byDay[k]||[]); byDay[k].push(p); } } });

  return (
    <div style={{flex:1,overflow:'auto',padding:'28px 28px',background:'#ede8e0'}}>
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}}>
        <h1 style={{fontSize:'18px',fontWeight:800,color:BR,flex:1}}>Calendario</h1>
        <button onClick={()=>{if(m===0){setM(11);setY(y-1);}else setM(m-1);}} style={{padding:'5px 12px',background:'white',border:`1px solid ${BD}`,borderRadius:'3px',cursor:'pointer',color:BR,fontFamily:'Manrope,sans-serif',fontSize:'13px'}}>←</button>
        <span style={{fontSize:'13px',fontWeight:700,color:BR,minWidth:'130px',textAlign:'center'}}>{MONTHS[m]} {y}</span>
        <button onClick={()=>{if(m===11){setM(0);setY(y+1);}else setM(m+1);}} style={{padding:'5px 12px',background:'white',border:`1px solid ${BD}`,borderRadius:'3px',cursor:'pointer',color:BR,fontFamily:'Manrope,sans-serif',fontSize:'13px'}}>→</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'1px',background:BD,border:`1px solid ${BD}`,borderRadius:'6px',overflow:'hidden'}}>
        {DAYS.map(d=><div key={d} style={{background:CR,padding:'8px 6px',textAlign:'center',fontSize:'9px',fontWeight:700,letterSpacing:'0.1em',color:'#a89888'}}>{d}</div>)}
        {cells.map((day,i)=>{
          const isToday = day&&today.getDate()===day&&today.getMonth()===m&&today.getFullYear()===y;
          return (
            <div key={i} style={{background:'white',minHeight:'78px',padding:'6px 7px',opacity:day?1:0.25}}>
              {day && <>
                <div style={{fontSize:'11px',fontWeight:isToday?800:400,color:isToday?RD:'#8c7a6a',marginBottom:'4px',display:'flex',alignItems:'center',gap:'4px'}}>
                  {day}{isToday&&<span style={{width:'5px',height:'5px',borderRadius:'50%',background:RD,display:'inline-block'}}/>}
                </div>
                {(byDay[day]||[]).map(p=>(
                  <div key={p.id} onClick={()=>onEdit(p.id)} title={p.fields.title} style={{fontSize:'9px',fontWeight:600,padding:'2px 5px',borderRadius:'2px',background:'#f5ede8',color:BR,cursor:'pointer',marginBottom:'2px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {p.fields.title||'Senza titolo'}
                  </div>
                ))}
              </>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────────────── CREATOR ───────────────────────────── */
function Creator({ post: init, onSave, onBack }) {
  const [post, setPost] = useState(()=>init||mkPost());
  const [off,  setOff]  = useState(()=>init?.off||EMPTY_OFF());
  const [hov,  setHov]  = useState(null);
  const [sc,   setSc]   = useState(.46);
  const [topic,  setTopic]  = useState('');
  const [selEl,  setSelEl]  = useState(null); // selected element for typography
  const [typo,   setTypo]   = useState(()=>init?.typo||{}); // {elementKey: {fontSize, fontWeight, lineHeight}}
  const [aiOn,   setAiOn]   = useState(false);
  const [exping, setExping] = useState(false);
  const [saved,  setSaved]  = useState(false);
  const canvasRef = useRef(null);
  const fileRefs  = [useRef(),useRef(),useRef()];
  const tmpl = TEMPLATES[post.template]||TEMPLATES.progetti;

  useEffect(()=>{
    const calc=()=>{
      const sW=248,pad=20;
      const s=Math.min((window.innerHeight-pad*2-44)/tmpl.h,(window.innerWidth-sW-pad*2)/tmpl.w,.7);
      setSc(s);
    };
    calc(); window.addEventListener('resize',calc); return()=>window.removeEventListener('resize',calc);
  },[tmpl]);

  const upd   = (k,v) => setPost(p=>({...p,fields:{...p.fields,[k]:v}}));
  const updP  = obj   => setPost(p=>({...p,...obj}));

  const startDrag = useCallback((key,e)=>{
    if(e.button!==0)return;
    e.preventDefault(); e.stopPropagation();
    const sx=e.clientX,sy=e.clientY,ox0=off[key]?.x||0,oy0=off[key]?.y||0;
    const mv=me=>setOff(o=>({...o,[key]:{x:ox0+(me.clientX-sx)/sc,y:oy0+(me.clientY-sy)/sc}}));
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  },[off,sc]);

  const handlePhoto=(i,e)=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=ev=>setPost(p=>{const ph=[...p.photos];ph[i]=ev.target.result;return{...p,photos:ph};});
    r.readAsDataURL(f);
  };

  const generateAI=async()=>{
    if(!topic.trim())return; setAiOn(true);
    try {
      const res=await window.claude.complete({messages:[{role:'user',content:
        `Sei il copywriter di Opera Prima, General Contractor per hospitality e workspace di lusso.\n\nCrea contenuto per un post ${tmpl.tag} su: "${topic}"\n\nRispondi SOLO con JSON valido (niente markdown né backtick):\n{"title":"max 16 chars MAIUSCOLO","location":"Città","description":"max 130 chars professionale ed elegante","year":"2026","subcategory":"ESPERIENZA o HOSPITALITY o UFFICI o RETAIL","caption":"caption IG pronta con hashtag, max 200 chars"}`
      }]});
      const j=JSON.parse(res.trim());
      setPost(p=>({...p,fields:{...p.fields,...j}}));
    }catch(e){console.error(e);}
    setAiOn(false);
  };

  const doSave=(status=post.status)=>{
    onSave({...post,off,typo,status,updatedAt:new Date().toISOString()});
    setSaved(true); setTimeout(()=>setSaved(false),1800);
  };

  const exportPNG=async()=>{
    setExping(true);
    const el=canvasRef.current, prev=el.style.transform;
    el.style.transform='scale(1)';
    await document.fonts.ready;
    try {
      const cvs=await html2canvas(el,{scale:1,width:tmpl.w,height:tmpl.h,useCORS:true,allowTaint:true,backgroundColor:post.template==='story'?'#1c100a':CR,logging:false});
      el.style.transform=prev;
      const a=document.createElement('a');
      a.download=`OP-${(post.fields.title||'post').replace(/\s+/g,'-')}-${post.fields.location||''}.png`;
      a.href=cvs.toDataURL('image/png'); a.click();
    }catch(e){console.error(e);el.style.transform=prev;}
    setExping(false);
  };

  const S = {
    sect:  { padding:'11px 15px', borderBottom:`1px solid #f0e8e0` },
    label: { display:'block',fontSize:'8px',fontWeight:600,letterSpacing:'0.18em',textTransform:'uppercase',color:RD,marginBottom:'8px' },
    fl:    { display:'block',fontSize:'8px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'#8c7a6a',marginBottom:'3px' },
    inp:   { width:'100%',padding:'6px 8px',fontFamily:'Manrope,sans-serif',fontSize:'11px',color:'#1c100a',background:CR,border:`1.5px solid ${BD}`,borderRadius:'3px',outline:'none',boxSizing:'border-box' },
    ta:    { width:'100%',padding:'6px 8px',fontFamily:'Manrope,sans-serif',fontSize:'11px',color:'#1c100a',background:CR,border:`1.5px solid ${BD}`,borderRadius:'3px',outline:'none',resize:'vertical',minHeight:'56px',boxSizing:'border-box' },
  };
  const cprops = {off,onDrag:startDrag,hov,setHov,selEl,onSelect:setSelEl,typo};
  const selTypo = selEl ? (typo[selEl]||{}) : null;
  const updTypo = (k,v) => setTypo(t=>({...t,[selEl]:{...(t[selEl]||{}),[k]:v}}));

  return (
    <div style={{flex:1,display:'flex',overflow:'hidden'}}>

      {/* ── SIDEBAR ── */}
      <aside style={{width:248,flexShrink:0,background:'white',borderRight:`1px solid ${BD}`,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'10px 12px',borderBottom:`1px solid ${BD}`,display:'flex',gap:'6px',alignItems:'center'}}>
          <button onClick={onBack} style={{padding:'5px 9px',background:'none',border:`1px solid ${BD}`,borderRadius:'3px',fontSize:'9px',cursor:'pointer',color:'#8c7a6a',fontFamily:'Manrope,sans-serif',fontWeight:600}}>← Libreria</button>
          <div style={{flex:1}}/>
          <button onClick={()=>doSave('draft')} style={{padding:'5px 9px',background:'none',border:`1px solid ${BD}`,borderRadius:'3px',fontSize:'9px',fontWeight:700,cursor:'pointer',color:'#8c7a6a',fontFamily:'Manrope,sans-serif',letterSpacing:'0.04em',textTransform:'uppercase'}}>{saved?'✓ Salvato':'Salva'}</button>
          <button onClick={()=>doSave('ready')} style={{padding:'5px 10px',background:BR,color:'white',border:'none',borderRadius:'3px',fontSize:'9px',fontWeight:700,cursor:'pointer',fontFamily:'Manrope,sans-serif',letterSpacing:'0.04em',textTransform:'uppercase'}}>Pronto</button>
        </div>

        <div style={{flex:1,overflowY:'auto',paddingBottom:'16px'}}>

          {/* Template */}
          <div style={S.sect}>
            <span style={S.label}>Template</span>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px'}}>
              {Object.entries(TEMPLATES).map(([k,t])=>(
                <button key={k} onClick={()=>updP({template:k})} style={{padding:'7px 4px',borderRadius:'3px',cursor:'pointer',fontFamily:'Manrope,sans-serif',fontSize:'8px',fontWeight:700,letterSpacing:'0.04em',textAlign:'center',lineHeight:1.3,border:post.template===k?'none':`1.5px solid ${BD}`,background:post.template===k?BR:'transparent',color:post.template===k?'white':'#8c7a6a'}}>
                  {t.label}<br/><span style={{opacity:.6,fontWeight:400}}>{t.tag}</span>
                </button>
              ))}
            </div>
          </div>

          {/* AI */}
          <div style={S.sect}>
            <span style={S.label}>✦ Genera con AI</span>
            <textarea value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Es: Suite presidenziale Hotel de Russie, Roma, arredi su misura Poltrona Frau…" onKeyDown={e=>{if(e.key==='Enter'&&e.metaKey)generateAI();}} style={{...S.ta,minHeight:'48px'}}/>
            <button onClick={generateAI} disabled={aiOn||!topic.trim()} style={{marginTop:'6px',width:'100%',padding:'8px',background:aiOn||!topic.trim()?'#c4b9aa':RD,color:'white',border:'none',borderRadius:'3px',fontSize:'9px',fontWeight:700,cursor:aiOn||!topic.trim()?'default':'pointer',fontFamily:'Manrope,sans-serif',textTransform:'uppercase',letterSpacing:'0.06em'}}>
              {aiOn?'Generando…':'Genera contenuto'}

          </div>

          {/* ── TYPOGRAPHY PANEL ── */}
          {selEl && (
            <div style={{padding:'11px 15px', borderBottom:'1px solid #f0e8e0', background:'#fffaf7'}}>

                    <button onClick={()=>updTypo('fontSize',Math.max(8,(selTypo.fontSize||56)-4))} style={{width:'26px',height:'26px',background:'none',border:'1.5px solid #e0d8cd',borderRadius:'3px',cursor:'pointer',fontSize:'14px',color:'#513a2a',fontFamily:'Manrope,sans-serif',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>−</button>
                    <span style={{flex:1,textAlign:'center',fontSize:'11px',fontWeight:700,color:'#513a2a'}}>{selTypo.fontSize ? selTypo.fontSize+'px' : 'auto'}</span>
                    <button onClick={()=>updTypo('fontSize',(selTypo.fontSize||56)+4)} style={{width:'26px',height:'26px',background:'none',border:'1.5px solid #e0d8cd',borderRadius:'3px',cursor:'pointer',fontSize:'14px',color:'#513a2a',fontFamily:'Manrope,sans-serif',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>+</button>
                  </div>
                </div>
                <div>
                  <label style={{display:'block',fontSize:'8px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'#8c7a6a',marginBottom:'3px'}}>Interlinea</label>
                  <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
                    <button onClick={()=>updTypo('lineHeight',+(Math.max(0.7,parseFloat((selTypo.lineHeight||1))-0.05).toFixed(2)))} style={{width:'26px',height:'26px',background:'none',border:'1.5px solid #e0d8cd',borderRadius:'3px',cursor:'pointer',fontSize:'14px',color:'#513a2a',fontFamily:'Manrope,sans-serif',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>−</button>
                    <span style={{flex:1,textAlign:'center',fontSize:'11px',fontWeight:700,color:'#513a2a'}}>{parseFloat(selTypo.lineHeight||1).toFixed(2)}</span>
                    <button onClick={()=>updTypo('lineHeight',+(parseFloat((selTypo.lineHeight||1))+0.05).toFixed(2))} style={{width:'26px',height:'26px',background:'none',border:'1.5px solid #e0d8cd',borderRadius:'3px',cursor:'pointer',fontSize:'14px',color:'#513a2a',fontFamily:'Manrope,sans-serif',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>+</button>
                  </div>
                </div>
              </div>
              <div style={{marginBottom:'8px'}}>
                <label style={{display:'block',fontSize:'8px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'#8c7a6a',marginBottom:'4px'}}>Peso carattere</label>
                <div style={{display:'flex',gap:'3px'}}>
                  {[['Thin','300'],['Regular','400'],['Semi','600'],['Bold','800']].map(([l,w])=>(
                    <button key={w} onClick={()=>updTypo('fontWeight',parseInt(w))} style={{flex:1,padding:'5px 2px',borderRadius:'3px',cursor:'pointer',fontFamily:'Manrope,sans-serif',fontSize:'8px',fontWeight:parseInt(w),border:(selTypo.fontWeight||0)===parseInt(w)?'none':'1.5px solid #e0d8cd',background:(selTypo.fontWeight||0)===parseInt(w)?BR:'white',color:(selTypo.fontWeight||0)===parseInt(w)?'white':'#8c7a6a'}}>{l}</button>
                  ))}
                </div>
              </div>
              <button onClick={()=>{setTypo(t=>{const n={...t};delete n[selEl];return n;});}} style={{width:'100%',padding:'4px',background:'none',border:'1px solid #e0d8cd',borderRadius:'3px',fontSize:'8px',cursor:'pointer',color:'#c4b9aa',fontFamily:'Manrope,sans-serif'}}>↺ Reset elemento</button>
            </div>
          )}

          {/* Fields */}
          <div style={S.sect}>
            <span style={S.label}>Contenuto</span>
            {[['Titolo','title'],['Città','location'],['Anno','year']].map(([l,k])=>(
              <div key={k} style={{marginBottom:'7px'}}>
                <label style={S.fl}>{l}</label>
                <input value={post.fields[k]} onChange={e=>upd(k,e.target.value)} style={S.inp}/>
              </div>
            ))}
            <div style={{marginBottom:'7px'}}>
              <label style={S.fl}>Categoria</label>
              <input value={post.fields.category} onChange={e=>upd('category',e.target.value)} style={S.inp}/>
            </div>
            <div style={{marginBottom:'7px'}}>
              <label style={S.fl}>Sottocategoria</label>
              <select value={post.fields.subcategory} onChange={e=>upd('subcategory',e.target.value)} style={{...S.inp,cursor:'pointer'}}>
                {SUBS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={{marginBottom:'7px'}}>
              <label style={S.fl}>Descrizione</label>
              <textarea value={post.fields.description} onChange={e=>upd('description',e.target.value)} style={S.ta}/>
            </div>
            <div style={{marginBottom:'7px'}}>
              <label style={S.fl}>Caption IG</label>
              <textarea value={post.fields.caption} onChange={e=>upd('caption',e.target.value)} placeholder="Caption pronta per pubblicare…" style={{...S.ta,minHeight:'48px'}}/>
            </div>
            <div style={{display:'flex',gap:'5px'}}>
              {['brown','red'].map(c=>(
                <button key={c} onClick={()=>upd('colorMode',c)} style={{flex:1,padding:'6px',borderRadius:'3px',cursor:'pointer',fontFamily:'Manrope,sans-serif',fontSize:'8px',fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',border:post.fields.colorMode===c?'none':`1.5px solid ${BD}`,background:post.fields.colorMode===c?(c==='brown'?BR:RD):'white',color:post.fields.colorMode===c?'white':'#8c7a6a'}}>
                  {c==='brown'?'Marrone':'Rosso'}
                </button>
              ))}
            </div>
          </div>

          {/* Photos */}
          {tmpl.nPhoto>0 && (
            <div style={S.sect}>
              <span style={S.label}>Foto</span>
              <div style={{display:'flex',gap:'6px'}}>
                {Array.from({length:tmpl.nPhoto}).map((_,i)=>(
                  <div key={i} style={{flex:1}}>
                    <input type="file" accept="image/*" ref={fileRefs[i]} style={{display:'none'}} onChange={e=>handlePhoto(i,e)}/>
                    <div onClick={()=>fileRefs[i].current.click()} style={{aspectRatio:tmpl.nPhoto===1?'9/16':'9/12',cursor:'pointer',background:post.photos[i]?'transparent':'#f5ede8',border:`1.5px dashed ${BD}`,borderRadius:'2px',backgroundImage:post.photos[i]?`url(${post.photos[i]})`:'none',backgroundSize:'cover',backgroundPosition:'center',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',color:'#c4b9aa'}}>
                      {!post.photos[i]&&'+'}
                    </div>
                    {post.photos[i] && <button onClick={e=>{e.stopPropagation();setPost(p=>{const ph=[...p.photos];ph[i]=null;return{...p,photos:ph};})}} style={{width:'100%',marginTop:'2px',padding:'2px',background:'none',border:`1px solid ${BD}`,borderRadius:'2px',fontSize:'8px',cursor:'pointer',color:'#c4b9aa',fontFamily:'Manrope,sans-serif'}}>✕</button>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Schedule */}
          <div style={S.sect}>
            <span style={S.label}>Pianificazione</span>
            <label style={S.fl}>Data pubblicazione</label>
            <input type="date" value={post.scheduledDate||''} onChange={e=>updP({scheduledDate:e.target.value||null})} style={S.inp}/>
          </div>

          {/* Export */}
          <div style={{padding:'11px 15px'}}>
            <span style={S.label}>Esporta</span>
            <button onClick={()=>setOff(EMPTY_OFF())} style={{width:'100%',padding:'7px',background:'none',border:`1.5px solid ${BD}`,borderRadius:'3px',fontSize:'8px',fontWeight:600,cursor:'pointer',color:'#8c7a6a',fontFamily:'Manrope,sans-serif',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'6px'}}>↺ Reset posizioni</button>
            <button onClick={exportPNG} disabled={exping} style={{width:'100%',padding:'9px',background:exping?'#c4b9aa':RD,color:'white',border:'none',borderRadius:'3px',fontSize:'9px',fontWeight:700,cursor:exping?'default':'pointer',fontFamily:'Manrope,sans-serif',textTransform:'uppercase',letterSpacing:'0.06em'}}>
              {exping?'Esportando…':'↓ Esporta PNG'}
            </button>
          </div>
        </div>
      </aside>

      {/* ── CANVAS ── */}
      <main style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'10px',padding:'20px',background:'#ede8e0',overflow:'hidden'}}>
        <div style={{position:'relative',width:tmpl.w*sc+'px',height:tmpl.h*sc+'px'}}>
          <div ref={canvasRef} style={{width:tmpl.w+'px',height:tmpl.h+'px',background:post.template==='story'?'#1c100a':CR,position:'relative',overflow:'hidden',transformOrigin:'top left',transform:`scale(${sc})`}}>
            {post.template==='progetti' && <ProgettiCanvas p={post} {...cprops}/>}
            {post.template==='ethos'    && <EthosCanvas    p={post} {...cprops}/>}
            {post.template==='story'    && <StoryCanvas    p={post} {...cprops}/>}
            {post.template==='linkedin' && <LinkedInCanvas p={post} {...cprops}/>}
          </div>
        </div>
        <div style={{fontSize:'8px',fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#a89888'}}>
          {tmpl.w}×{tmpl.h}px · {tmpl.tag} · Trascina gli elementi per riposizionarli
        </div>
      </main>
    </div>
  );
}

/* ─────────────────── APP ROOT ─────────────────────────── */

/* ─── API KEY SETUP ─── */
function ApiKeySetup({ onSave }) {
  const [key, setKey] = React.useState('');
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(28,16,10,.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999}}>
      <div style={{background:'white',borderRadius:'8px',padding:'32px',width:'420px',boxShadow:'0 20px 60px rgba(0,0,0,.3)'}}>
        <div style={{fontSize:'18px',fontWeight:800,color:BR,marginBottom:'6px'}}>Opera Prima Social Tool</div>
        <div style={{fontSize:'11px',color:'#8c7a6a',marginBottom:'20px',lineHeight:1.5}}>Inserisci la tua Anthropic API key per abilitare la generazione AI dei contenuti.</div>
        <label style={{fontSize:'9px',fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:RD,display:'block',marginBottom:'6px'}}>Anthropic API Key</label>
        <input
          type="password"
          value={key}
          onChange={e=>setKey(e.target.value)}
          placeholder="sk-ant-..."
          onKeyDown={e=>e.key==='Enter'&&key.startsWith('sk-')&&onSave(key)}
          style={{width:'100%',padding:'9px 11px',fontFamily:'Manrope,sans-serif',fontSize:'12px',border:'1.5px solid #e0d8cd',borderRadius:'4px',outline:'none',marginBottom:'12px',color:'#513a2a'}}
        />
        <button
          onClick={()=>key.startsWith('sk-')&&onSave(key)}
          disabled={!key.startsWith('sk-')}
          style={{width:'100%',padding:'11px',background:key.startsWith('sk-')?'#c9302d':'#c4b9aa',color:'white',border:'none',borderRadius:'4px',fontSize:'11px',fontWeight:700,cursor:key.startsWith('sk-')?'pointer':'default',fontFamily:'Manrope,sans-serif',letterSpacing:'0.06em',textTransform:'uppercase'}}
        >Inizia</button>
        <div style={{fontSize:'9px',color:'#c4b9aa',marginTop:'10px',textAlign:'center'}}>La chiave viene salvata solo nel tuo browser locale</div>
      </div>
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = React.useState(()=>localStorage.getItem('op_api_key')||'');
  const [view,   setView]   = useState('library');
  const [posts,  setPosts]  = useState(()=>loadP());
  const [editId, setEditId] = useState(null);

  useEffect(()=>saveP(posts),[posts]);
  useEffect(()=>{ if(apiKey) window.__ANTHROPIC_KEY=apiKey; },[apiKey]);

  const saveKey = k => { window.__ANTHROPIC_KEY=k; localStorage.setItem('op_api_key',k); setApiKey(k); };
  const create  = () => { const p=mkPost(); setPosts(prev=>[p,...prev]); setEditId(p.id); setView('creator'); };
  const save    = u  => setPosts(prev=>prev.map(p=>p.id===u.id?u:p));
  const del     = id => { setPosts(prev=>prev.filter(p=>p.id!==id)); if(editId===id){setEditId(null);setView('library');} };
  const edit    = id => { setEditId(id); setView('creator'); };
  const editing = posts.find(p=>p.id===editId)||null;

  return (
    <div style={{display:'flex',height:'100vh',fontFamily:'Manrope,sans-serif'}}>
      {!apiKey && <ApiKeySetup onSave={saveKey}/>}
      <Nav view={view} setView={setView} onNew={create} count={posts.length}/>
      <div style={{flex:1,overflow:'hidden',display:'flex'}}>
        {view==='library'  && <Library  posts={posts} onEdit={edit} onDelete={del} onCreate={create}/>}
        {view==='creator'  && <Creator  post={editing} onSave={save} onBack={()=>setView('library')}/>}
        {view==='calendar' && <Calendar posts={posts} onEdit={edit}/>}
      </div>
    </div>
  );
}
